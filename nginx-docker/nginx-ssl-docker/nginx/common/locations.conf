# Common locations content here
# Health check endpoint
location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# Favicon (prevent 404 in logs)
location = /favicon.ico {
    log_not_found off;
    access_log off;
}

# Robots.txt
location = /robots.txt {
    log_not_found off;
    access_log off;
}

# Deny access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}