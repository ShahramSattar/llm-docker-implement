# Development SSL Configuration with Self-Signed Certificate

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    
    # Allow Let's Encrypt challenge (even in dev)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server with self-signed certificate
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;
    
    # Self-signed certificate paths
    ssl_certificate /etc/nginx/ssl/self-signed/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/self-signed/key.pem;
    
    # SSL configuration optimized for development
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # SSL session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Basic security headers (less strict for development)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Root directory and index
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Main location block
    location / {
        try_files $uri $uri/ =404;
    }
    location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

    
